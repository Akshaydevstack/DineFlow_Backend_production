        # ====================================================


       
        # ================= WEBSOCKETS (DAPHNE) ==============    
        # This catches ALL websocket traffic (/ws/kitchen/, /ws/notifications/, etc.)
        # and sends it to the Notification Service (Daphne)
        location /ws/ {

            access_by_lua_block {
                local jwt = require "resty.jwt"
                local cjson = require "cjson"

                local function respond(status, code, message)
                    ngx.status = status
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say(cjson.encode({
                        success = false,
                        error = { code = code, message = message }
                    }))
                    return ngx.exit(status)
                end

                -- 1️⃣ Extract Token from query parameter (e.g. ?token=...)
                local token = ngx.var.arg_token
                
                -- Fallback to header if query param is missing
                if not token then
                    local auth = ngx.var.http_authorization
                    if auth then token = auth:match("Bearer%s+(.+)") end
                end

                if not token then return respond(401, "AUTH_MISSING", "Token required") end

                -- 2️⃣ Load public key
                local pubkey = ngx.shared.jwt_cache:get("pubkey")
                if not pubkey then
                    local f = io.open("/etc/nginx/jwt/public.pem", "r")
                    if not f then return respond(500, "GATEWAY_ERROR", "Public key not found") end
                    pubkey = f:read("*a"); f:close(); ngx.shared.jwt_cache:set("pubkey", pubkey)
                end

                -- 3️⃣ Verify JWT
                local jwt_obj = jwt:verify(pubkey, token)
                if not jwt_obj.verified then return respond(401, "TOKEN_INVALID", "Invalid token") end

                local payload = jwt_obj.payload

                if payload.is_active ~= true then return respond(403, "ACCOUNT_BLOCKED", "User inactive") end
                if not payload.restaurant_id then return respond(403, "TENANT_MISSING", "Restaurant context missing") end

                -- 4️⃣ Forward user info to Django
                ngx.req.set_header("X-User-Id", payload.public_id)
                ngx.req.set_header("X-User-Name", payload.name)
                ngx.req.set_header("X-User-Email", payload.email)
                ngx.req.set_header("X-User-Role", payload.role)
                ngx.req.set_header("X-Restaurant-Id", payload.restaurant_id)
                ngx.req.set_header("X-Is-Superadmin", payload.is_superadmin)
            }

