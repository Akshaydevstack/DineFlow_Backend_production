        # ====================================================
        location /api/ai/ {
            
            if ($allowed_origin = "") {
                add_header Content-Type application/json always;
                return 403 '{"success": false, "error": {"code": "CORS_ERROR", "message": "Cross-Origin Request Blocked. Origin not allowed."}}'; 
            }

            set $cors_origin $allowed_origin;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                
                # 🚀 FIX: X-Table-Id added here!
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Table-Id" always;
                
                add_header Access-Control-Allow-Credentials "true" always;
                return 204;
            }

            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials "true" always;

            access_by_lua_block {
                local jwt = require "resty.jwt"
                local cjson = require "cjson"

                local function respond(status, code, message)
                    ngx.status = status
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say(cjson.encode({
                        success = false,
                        error = { code = code, message = message }
                    }))
                    return ngx.exit(status)
                end

                -- 🔐 NO PUBLIC ROUTES (fully protected)

                -- 1️⃣ Authorization header
                local auth = ngx.var.http_authorization
                if not auth then
                    return respond(401, "AUTH_HEADER_MISSING", "Authorization header is required")
                end

                -- 2️⃣ Extract token
                local token = auth:match("Bearer%s+(.+)")
                if not token then
                    return respond(401, "TOKEN_FORMAT_INVALID", "Invalid token format")
                end

                -- 3️⃣ Load public key (cached)
                local pubkey = ngx.shared.jwt_cache:get("pubkey")
                if not pubkey then
                    local f = io.open("/etc/nginx/jwt/public.pem", "r")
                    if not f then
                        return respond(500, "GATEWAY_ERROR", "Public key not found")
                    end
                    pubkey = f:read("*a")
                    f:close()
                    ngx.shared.jwt_cache:set("pubkey", pubkey, 86400)
                end

                -- 4️⃣ Verify JWT
                local jwt_obj = jwt:verify(pubkey, token)
                if not jwt_obj.verified then
                    return respond(401, "TOKEN_INVALID", "Invalid or expired token")
                end

                local payload = jwt_obj.payload

                -- 5️⃣ Account check
                if payload.is_active ~= true then
                    return respond(403, "ACCOUNT_BLOCKED", "User account is inactive")
                end

                -- =================================================
                -- 🚦 RATE LIMITING (AI Service)
                -- =================================================

                local limit_req = require "resty.limit.req"
                
                local lim, err = limit_req.new("rl_ai", 10, 5)
                
                if not lim then
                    return respond(500, "GATEWAY_ERROR", "Rate limiter initialization failed")
                end

                local limit_key = payload.public_id .. ":ai"
                local delay, err = lim:incoming(limit_key, true)

                if not delay then
                    if err == "rejected" then
                        ngx.header["Retry-After"] = 1
                        return respond(429, "TOO_MANY_REQUESTS", "Rate limit exceeded. Please slow down.")
                    end
                    return respond(500, "GATEWAY_ERROR", "Rate limiter execution failed")
                end

                -- AI is heavily throttled on all requests (even GETs)
                if delay >= 0.001 then
                    ngx.sleep(delay)
                end

                ngx.req.set_header("X-User-Id", payload.public_id)
                ngx.req.set_header("X-User-Role", payload.role)
                ngx.req.set_header("X-Restaurant-Id", payload.restaurant_id)
            }

