events {
    worker_connections 1024;
}

http {

    # ====================================================
    # 🚦 LUA SHARED DICTIONARIES (Memory Caches)
    # ====================================================
    lua_shared_dict jwt_cache        10m;
    
    lua_shared_dict rl_public        5m;
    lua_shared_dict rl_auth          5m;
    lua_shared_dict rl_menu          5m;
    lua_shared_dict rl_cart          5m;
    lua_shared_dict rl_order         5m;
    lua_shared_dict rl_kitchen       5m;
    lua_shared_dict rl_notification  5m;
    lua_shared_dict rl_ai            5m;

    # ====================================================
    # 🛡️ SECURITY: Allowed Origins Whitelist
    # ====================================================
    map $http_origin $allowed_origin {
        default ""; 

        "https://dineflow.store"      $http_origin;
        "https://www.dineflow.store"  $http_origin;
    }

    resolver kube-dns.kube-system.svc.cluster.local valid=10s;

   # ================= UPSTREAMS (PRODUCTION) =================
    upstream auth_upstream {
        server auth-service.dineflow-production.svc.cluster.local:8000;
        keepalive 32;
    }

    upstream menu_upstream {
        server menu-service.dineflow-production.svc.cluster.local:8000;
        keepalive 32;
    }

    upstream cart_upstream {
        server cart-service.dineflow-production.svc.cluster.local:8000;
        keepalive 32;
    }

    upstream order_upstream {
        server order-service.dineflow-production.svc.cluster.local:8000;
        keepalive 32;
    }

    upstream kitchen_upstream {
        server kitchen-service.dineflow-production.svc.cluster.local:8000;
        keepalive 32;
    }

    upstream notification_upstream {
        server notification-service.dineflow-production.svc.cluster.local:8000;
        keepalive 32;
    }

    upstream ai_upstream {
        server ai-service.dineflow-production.svc.cluster.local:8001;
        keepalive 16;
    }
    
    # ================= SERVER =================
    server {
        listen 80;

        # ====================================================
        # 🛡️ SECURITY: Block all hidden files (like .env, .git)
        # ====================================================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ \.php$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ---------- GATEWAY HEALTH ----------
        location /api/gateway/health/ {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }

            access_log off;
            return 200 "GATEWAY IS HEALTH OK";
        }

        # ---------- STATIC FILES ----------
        location /static/ {
            proxy_pass http://auth_upstream;
            proxy_set_header Host $host;
            proxy_intercept_errors on;
            error_page 404 = @try_menu_static;
        }

        location @try_menu_static {
            proxy_pass http://menu_upstream;
            proxy_set_header Host $host;
        }

        #=================================
        # ---------- SWAGGER ----------
        #=================================

        location /api/auth/swagger/ {
            proxy_set_header Host $host;
            proxy_pass http://auth_upstream/api/auth/swagger/;
        }

        location /api/auth/schema/ {
            proxy_set_header Host $host;
            proxy_pass http://auth_upstream/api/auth/schema/;
        }

        location /api/menu/swagger/ {
            proxy_set_header Host $host;
            proxy_pass http://menu_upstream/api/menu/swagger/;
        }

        location /api/menu/schema/ {
            proxy_set_header Host $host;
            proxy_pass http://menu_upstream/api/menu/schema/;
        }

        location /api/cart/swagger/ {
            proxy_set_header Host $host;
            proxy_pass http://cart_upstream/api/cart/swagger/;
        }

        location /api/cart/schema/ {
            proxy_set_header Host $host;
            proxy_pass http://cart_upstream/api/cart/schema/;
        }

        location /api/order/swagger/ {
            proxy_set_header Host $host;
            proxy_pass http://order_upstream/api/order/swagger/;
        }

        location /api/order/schema/ {
            proxy_set_header Host $host;
            proxy_pass http://order_upstream/api/order/schema/;
        }

        location /api/kitchen/swagger/ {
            proxy_set_header Host $host;
            proxy_pass http://kitchen_upstream/api/kitchen/swagger/;
        }

        location /api/kitchen/schema/ {
            proxy_set_header Host $host;
            proxy_pass http://kitchen_upstream/api/kitchen/schema/;
        }

        location /api/notification/swagger/ {
            proxy_set_header Host $host;
            proxy_pass http://notification_upstream/api/notification/swagger/;
        }

        location /api/notification/schema/ {
            proxy_set_header Host $host;
            proxy_pass http://notification_upstream/api/notification/schema/;
        }

        location /api/ai/docs {
            proxy_set_header Host $host;
            proxy_pass http://ai_upstream/docs;
        }

        location /api/ai/redoc {
            proxy_set_header Host $host;
            proxy_pass http://ai_upstream/redoc;
        }

        location /api/ai/openapi.json {
            proxy_set_header Host $host;
            proxy_pass http://ai_upstream/openapi.json;
        }


        #=================================
        # ---------- HEALTH ----------
        #=================================
        location /api/auth/health/ {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            
