                end

                if delay >= 0.001 and ngx.var.request_method ~= "GET" then
                    ngx.sleep(delay)
                end

                ngx.req.set_header("X-User-Id", payload.public_id)
                ngx.req.set_header("X-User-name", payload.name)
                ngx.req.set_header("X-User-Email", payload.email)
                ngx.req.set_header("X-User-Role", payload.role)
                ngx.req.set_header("X-mobile_number",payload.mobile_number)
                ngx.req.set_header("X-Restaurant-Id",payload.restaurant_id)
                ngx.req.set_header("X-is_superadmin",payload.is_superadmin)
            }

            proxy_pass http://menu_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
