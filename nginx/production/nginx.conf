events {}

http {

    lua_shared_dict jwt_cache 10m;
    lua_shared_dict rate_limit_store 20m;

    # ====================================================
    # 🛡️ SECURITY: Allowed Origins Whitelist
    # ====================================================
    map $http_origin $allowed_origin {
        default ""; # If the domain isn't listed below, make it empty

        "https://dineflow.store"      $http_origin;
        "https://www.dineflow.store"  $http_origin;
        
        # Uncomment this line if you still need to test on your local Mac!
        # "http://localhost:5173"       $http_origin; 
    }

    resolver kube-dns.kube-system.svc.cluster.local valid=10s;

   # ================= UPSTREAMS (UPGRADED TO PRODUCTION) =================
    upstream auth_upstream {
        server auth-service.dineflow-production.svc.cluster.local:8000;
    }

    upstream menu_upstream {
        server menu-service.dineflow-production.svc.cluster.local:8000;
    }

    upstream cart_upstream {
        server cart-service.dineflow-production.svc.cluster.local:8000;
    }

    upstream order_upstream {
        server order-service.dineflow-production.svc.cluster.local:8000;
    }

    upstream kitchen_upstream {
        server kitchen-service.dineflow-production.svc.cluster.local:8000;
    }

    upstream notification_upstream {
        server notification-service.dineflow-production.svc.cluster.local:8000;
    }

    upstream ai_upstream {
        server ai-service.dineflow-production.svc.cluster.local:8001;
    }
    
    # ================= SERVER =================
    server {
        listen 80;

        # ====================================================
        # 🛡️ SECURITY: Block all hidden files (like .env, .git)
        # ====================================================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # 🛡️ SECURITY: Block PHP scanning
        location ~ \.php$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ---------- GATEWAY HEALTH ----------
        location /api/gateway/health/ {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }

            access_log off;
            return 200 "GATEWAY IS HEALTH OK";
        }

        # ---------- STATIC FILES ----------
        location /static/ {
            proxy_pass http://auth_upstream;
            proxy_set_header Host $host;
            proxy_intercept_errors on;
            error_page 404 = @try_menu_static;
        }

        location @try_menu_static {
            proxy_pass http://menu_upstream;
            proxy_set_header Host $host;
        }

        #=================================
        # ---------- SWAGGER ----------
        #=================================

        #------- Auth_Service ------------
        location /api/auth/swagger/ {
            proxy_set_header Host $host;
            proxy_pass http://auth_upstream/api/auth/swagger/;
        }

        location /api/auth/schema/ {
            proxy_set_header Host $host;
            proxy_pass http://auth_upstream/api/auth/schema/;
        }

        #------- Menu_Service ------------
        location /api/menu/swagger/ {
            proxy_set_header Host $host;
            proxy_pass http://menu_upstream/api/menu/swagger/;
        }

        location /api/menu/schema/ {
            proxy_set_header Host $host;
            proxy_pass http://menu_upstream/api/menu/schema/;
        }

        #------- Cart_Service ------------
        location /api/cart/swagger/ {
            proxy_set_header Host $host;
            proxy_pass http://cart_upstream/api/cart/swagger/;
        }

        location /api/cart/schema/ {
            proxy_set_header Host $host;
            proxy_pass http://cart_upstream/api/cart/schema/;
        }

        #------- Order_Service ------------
        location /api/order/swagger/ {
            proxy_set_header Host $host;
            proxy_pass http://order_upstream/api/order/swagger/;
        }

        location /api/order/schema/ {
            proxy_set_header Host $host;
            proxy_pass http://order_upstream/api/order/schema/;
        }

        #------- Kitchen_Service ------------
        location /api/kitchen/swagger/ {
            proxy_set_header Host $host;
            proxy_pass http://kitchen_upstream/api/kitchen/swagger/;
        }

        location /api/kitchen/schema/ {
            proxy_set_header Host $host;
            proxy_pass http://kitchen_upstream/api/kitchen/schema/;
        }

        #------- Notification_Service ------------
        location /api/notification/swagger/ {
            proxy_set_header Host $host;
            proxy_pass http://notification_upstream/api/notification/swagger/;
        }

        location /api/notification/schema/ {
            proxy_set_header Host $host;
            proxy_pass http://notification_upstream/api/notification/schema/;
        }

       #------- AI_Service ------------
        location /api/ai/docs {
            proxy_set_header Host $host;
            proxy_pass http://ai_upstream/docs;
        }

        location /api/ai/redoc {
            proxy_set_header Host $host;
            proxy_pass http://ai_upstream/redoc;
        }

        location /api/ai/openapi.json {
            proxy_set_header Host $host;
            proxy_pass http://ai_upstream/openapi.json;
        }


        # ---------- SERVICE HEALTH ----------
        location /api/auth/health/ {

            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }

            proxy_set_header Host $host;
            proxy_pass http://auth_upstream/health/;
        }


        location /api/menu/health/ {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_set_header Host $host;
            proxy_pass http://menu_upstream/health/;
        }

        location /api/cart/health/ {

            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_set_header Host $host;
            proxy_pass http://cart_upstream/health/;
        }

        location /api/order/health/ {

            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }

            proxy_set_header Host $host;
            proxy_pass http://order_upstream/health/;
        }

        location /api/kitchen/health/ {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_set_header Host $host;
            proxy_pass http://kitchen_upstream/health/;
        }

        location /api/notification/health/ {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_set_header Host $host;
            proxy_pass http://notification_upstream/health/;
        }


        location /api/ai/health/ {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }

            proxy_set_header Host $host;
            proxy_pass http://ai_upstream/health/;
        }


                
        # ====================================================
        # ================= AUTH ROUTES ======================
        # ====================================================


       location /api/auth/ {
            
            if ($allowed_origin = "") {
                add_header Content-Type application/json always;
                return 403 '{"success": false, "error": {"code": "CORS_ERROR", "message": "Cross-Origin Request Blocked. Origin not allowed."}}'; 
            }

            set $cors_origin $allowed_origin;

            # 3. Handle Preflight (OPTIONS) requests
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
                add_header Access-Control-Allow-Credentials "true" always;
                return 204;
            }

            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials "true" always;

            # ------------------------------------
            # 🔐 AUTH + RBAC LOGIC
            # ------------------------------------
            access_by_lua_block {
                local jwt = require "resty.jwt"
                local cjson = require "cjson"

                local function respond(status, code, message)
                    ngx.status = status
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say(cjson.encode({
                        success = false,
                        error = {
                            code = code,
                            message = message
                        }
                    }))
                    return ngx.exit(status)
                end

                local uri = ngx.var.uri

                -- -------------------------------------------------
                -- 🔓 PUBLIC AUTH ROUTES (Double mapped for trailing slashes)
                -- -------------------------------------------------
                local PUBLIC_ROUTES = {
                    ["/api/auth/otp/send"] = true,
                    ["/api/auth/otp/send/"] = true,
                    
                    ["/api/auth/forgot-password"] = true,
                    ["/api/auth/forgot-password/"] = true,
                    
                    ["/api/auth/check-user"] = true,
                    ["/api/auth/check-user/"] = true,
                    
                    ["/api/auth/login-firebase-user"] = true,
                    ["/api/auth/login-firebase-user/"] = true,
                    
                    ["/api/auth/logout-user"] = true,
                    ["/api/auth/logout-user/"] = true,
                    
                    ["/api/auth/restaurant-user-login"] = true,
                    ["/api/auth/restaurant-user-login/"] = true,
                    
                    ["/api/auth/refreshtoken-user"] = true,
                    ["/api/auth/refreshtoken-user/"] = true,
                    
                    ["/api/auth/change-password-user"] = true,
                    ["/api/auth/change-password-user/"] = true,
                    
                    ["/api/auth/test"] = true,
                    ["/api/auth/test/"] = true,
                    
                    ["/api/auth/register-user"] = true,
                    ["/api/auth/register-user/"] = true,   
                    
                    ["/api/auth/superadmin/login"] = true, 
                    ["/api/auth/superadmin/login/"] = true, 
                }

                if PUBLIC_ROUTES[uri] then
                    -- =================================================
                    -- 🚦 RATE LIMIT & THROTTLE PUBLIC ROUTES (By IP)
                    -- =================================================
                    local limit_req = require "resty.limit.req"
                    
                    -- Stricter limit for logins/registrations: 5 req/sec, burst of 2
                    local lim, err = limit_req.new("rate_limit_store", 5, 2)
                    
                    if lim then
                        local delay, err = lim:incoming(ngx.var.binary_remote_addr, true)
                        
                        if not delay then
                            if err == "rejected" then
                                ngx.header["Retry-After"] = 1
                                return respond(429, "TOO_MANY_REQUESTS", "Too many attempts. Please slow down.")
                            end
                        elseif delay >= 0.001 then
                            -- ⏱️ THROTTLING: Force the connection to sleep!
                            ngx.sleep(delay)
                        end
                    end
                    
                    -- Public route safe -> allow through to Django
                    return
                end

                -- -------------------------------------------------
                -- 🧠 ALLOWED ROLES (RBAC)
                -- -------------------------------------------------
                local ALLOWED_ROLES = {
                    ["super-admin"] = true,
                    ["restaurant-admin"] = true,
                    ["waiter"] = true,
                    ["kitchen-staff"] = true,
                    ["customer"] = true
                }

                -- -------------------------------------------------
                -- 🧭 EXTRACT ROLE FROM URL
                -- -------------------------------------------------
                local role = uri:match("^/api/auth/([^/]+)/")

                if not role or not ALLOWED_ROLES[role] then
                    return respond(404, "INVALID_ROUTE", "Invalid auth route")
                end

                -- -------------------------------------------------
                -- 🔑 AUTHORIZATION HEADER
                -- -------------------------------------------------
                local auth = ngx.var.http_authorization
                if not auth then
                    return respond(401, "AUTH_HEADER_MISSING", "Authorization header required")
                end

                local token = auth:match("Bearer%s+(.+)")
                if not token then
                    return respond(401, "TOKEN_FORMAT_INVALID", "Invalid token format")
                end

                -- -------------------------------------------------
                -- 🔏 LOAD JWT PUBLIC KEY (CACHED)
                -- -------------------------------------------------
                local pubkey = ngx.shared.jwt_cache:get("pubkey")
                if not pubkey then
                    local f = io.open("/etc/nginx/jwt/public.pem", "r")
                    if not f then
                        return respond(500, "GATEWAY_ERROR", "JWT public key not found")
                    end
                    pubkey = f:read("*a")
                    f:close()
                    ngx.shared.jwt_cache:set("pubkey", pubkey)
                end

                local jwt_obj = jwt:verify(pubkey, token)
                if not jwt_obj.verified then
                    return respond(401, "TOKEN_INVALID", "Invalid or expired token")
                end

                local payload = jwt_obj.payload

                -- -------------------------------------------------
                -- 🚫 ACCOUNT STATUS CHECK
                -- -------------------------------------------------
                if payload.is_active ~= true then
                    return respond(403, "ACCOUNT_BLOCKED", "User account is inactive")
                end

                -- -------------------------------------------------
                -- 🧠 ROLE-BASED ACCESS CONTROL
                -- -------------------------------------------------
                if payload.role ~= role then
                    return respond(403, "ROLE_FORBIDDEN", "Access denied for this role")
                end

                -- =================================================
                -- 🚦 RATE LIMIT & THROTTLE AUTHENTICATED ROUTES (By User ID)
                -- =================================================

                local limit_req = require "resty.limit.req"
                
                -- Standard limit for logged-in users: 20 req/sec
                local lim, err = limit_req.new("rate_limit_store", 20, 20)
                
                if not lim then
                    return respond(500, "GATEWAY_ERROR", "Rate limiter initialization failed")
                end

                local limit_key = payload.public_id
                local delay, err = lim:incoming(limit_key, true)

                if not delay then
                    if err == "rejected" then
                        ngx.header["Retry-After"] = 1
                        return respond(429, "TOO_MANY_REQUESTS", "Rate limit exceeded. Please slow down.")
                    end
                    return respond(500, "GATEWAY_ERROR", "Rate limiter execution failed")
                end

                -- ⏱️ THROTTLING: Force the connection to sleep!
                if delay >= 0.001 then
                    ngx.sleep(delay)
                end

                -- =================================================

                -- -------------------------------------------------
                -- 🧾 PASS USER CONTEXT TO BACKEND
                -- -------------------------------------------------
                ngx.req.set_header("X-User-Id", payload.public_id)
                ngx.req.set_header("X-User-Name", payload.name)
                ngx.req.set_header("X-User-Email", payload.email)
                ngx.req.set_header("X-User-Role", payload.role)
                ngx.req.set_header("X-Mobile-Number", payload.mobile_number)
                ngx.req.set_header("X-Restaurant-Id", payload.restaurant_id)
                ngx.req.set_header("X-Is-Superadmin", payload.is_superadmin)
            }

            proxy_pass http://auth_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }


        # ====================================================
        # ================= MENU ROUTES ======================
        # ====================================================

        
        location /api/menu/ {


           if ($allowed_origin = "") {
                add_header Content-Type application/json always;
                return 403 '{"success": false, "error": {"code": "CORS_ERROR", "message": "Cross-Origin Request Blocked. Origin not allowed."}}'; 
            }

            # 2. Assign the verified origin to your CORS variable
            set $cors_origin $allowed_origin;

            # 3. Handle Preflight (OPTIONS) requests
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
                add_header Access-Control-Allow-Credentials "true" always;
                return 204;
            }

            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials "true" always;

            access_by_lua_block {
                local jwt = require "resty.jwt"
                local cjson = require "cjson"

                local function respond(status, code, message)
                    ngx.status = status
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say(cjson.encode({
                        success = false,
                        error = { code = code, message = message }
                    }))
                    return ngx.exit(status)
                end

                local auth = ngx.var.http_authorization
                if not auth then
                    return respond(401, "AUTH_HEADER_MISSING", "Authorization header is required")
                end

                local token = auth:match("Bearer%s+(.+)")
                if not token then
                    return respond(401, "TOKEN_FORMAT_INVALID", "Invalid token format")
                end

                local pubkey = ngx.shared.jwt_cache:get("pubkey")
                if not pubkey then
                    local f = io.open("/etc/nginx/jwt/public.pem", "r")
                    if not f then
                        return respond(500, "GATEWAY_ERROR", "Public key not found")
                    end
                    pubkey = f:read("*a")
                    f:close()
                    ngx.shared.jwt_cache:set("pubkey", pubkey)
                end

                local jwt_obj = jwt:verify(pubkey, token)
                if not jwt_obj.verified then
                    return respond(401, "TOKEN_INVALID", "Invalid or expired token")
                end

                local payload = jwt_obj.payload
                if payload.is_active ~= true then
                    return respond(403, "ACCOUNT_BLOCKED", "User account is inactive")
                end

                local role = ngx.var.uri:match("^/api/menu/([^/]+)/")
                if role and role ~= payload.role then
                    return respond(403, "ROLE_MISMATCH", "You are not allowed to access this resource")
                end

                -- =================================================
                -- 🚦 RATE LIMITING (Menu Service)
                -- =================================================

                local limit_req = require "resty.limit.req"
                
                local lim, err = limit_req.new("rate_limit_store", 20, 20)
                
                if not lim then
                    return respond(500, "GATEWAY_ERROR", "Rate limiter initialization failed")
                end

                local limit_key = payload.public_id 
                local delay, err = lim:incoming(limit_key, true)

                if not delay then
                    if err == "rejected" then
                        ngx.header["Retry-After"] = 1
                        return respond(429, "TOO_MANY_REQUESTS", "Rate limit exceeded. Please slow down.")
                    end
                    return respond(500, "GATEWAY_ERROR", "Rate limiter execution failed")
                end

                -- ⏱️ THROTTLING: Force the connection to sleep if going too fast!
                if delay >= 0.001 then
                    ngx.sleep(delay)
                end

                -- =================================================
                -- 🚦 END OF RATE LIMITING LOGIC
                -- =================================================
                

                ngx.req.set_header("X-User-Id", payload.public_id)
                ngx.req.set_header("X-User-name", payload.name)
                ngx.req.set_header("X-User-Email", payload.email)
                ngx.req.set_header("X-User-Role", payload.role)
                ngx.req.set_header("X-mobile_number",payload.mobile_number)
                ngx.req.set_header("X-Restaurant-Id",payload.restaurant_id)
                ngx.req.set_header("X-is_superadmin",payload.is_superadmin)
            }

            proxy_pass http://menu_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ====================================================
        # ================= CART ROUTES ======================
        # ====================================================


        location /api/cart/ {

            if ($allowed_origin = "") {
                add_header Content-Type application/json always;
                return 403 '{"success": false, "error": {"code": "CORS_ERROR", "message": "Cross-Origin Request Blocked. Origin not allowed."}}'; 
            }

            # 2. Assign the verified origin to your CORS variable
            set $cors_origin $allowed_origin;

            # 3. Handle Preflight (OPTIONS) requests
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
                add_header Access-Control-Allow-Credentials "true" always;
                return 204;
            }

            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials "true" always;

            access_by_lua_block {
                local jwt = require "resty.jwt"
                local cjson = require "cjson"

                local function respond(status, code, message)
                    ngx.status = status
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say(cjson.encode({
                        success = false,
                        error = { code = code, message = message }
                    }))
                    return ngx.exit(status)
                end

                local auth = ngx.var.http_authorization
                if not auth then
                    return respond(401, "AUTH_HEADER_MISSING", "Authorization header is required")
                end

                local token = auth:match("Bearer%s+(.+)")
                if not token then
                    return respond(401, "TOKEN_FORMAT_INVALID", "Invalid token format")
                end

                local pubkey = ngx.shared.jwt_cache:get("pubkey")
                if not pubkey then
                    local f = io.open("/etc/nginx/jwt/public.pem", "r")
                    if not f then
                        return respond(500, "GATEWAY_ERROR", "Public key not found")
                    end
                    pubkey = f:read("*a")
                    f:close()
                    ngx.shared.jwt_cache:set("pubkey", pubkey)
                end

                local jwt_obj = jwt:verify(pubkey, token)
                if not jwt_obj.verified then
                    return respond(401, "TOKEN_INVALID", "Invalid or expired token")
                end

                local payload = jwt_obj.payload
                if payload.is_active ~= true then
                    return respond(403, "ACCOUNT_BLOCKED", "User account is inactive")
                end
                
                local role = ngx.var.uri:match("^/api/cart/([^/]+)/")

                if role and role ~= payload.role then
                    return respond(
                        403,
                        "ROLE_MISMATCH",
                        "You are not allowed to access this resource"
                    )
                end

                -- =================================================
                -- 🚦 RATE LIMIT & THROTTLING (Cart Service)
                -- =================================================

                local limit_req = require "resty.limit.req"
                
                local lim, err = limit_req.new("rate_limit_store", 20, 20)
                
                if not lim then
                    return respond(500, "GATEWAY_ERROR", "Rate limiter initialization failed")
                end

                local limit_key = payload.public_id 
                local delay, err = lim:incoming(limit_key, true)

                if not delay then
                    if err == "rejected" then
                        ngx.header["Retry-After"] = 1
                        return respond(429, "TOO_MANY_REQUESTS", "Rate limit exceeded. Please slow down.")
                    end
                    return respond(500, "GATEWAY_ERROR", "Rate limiter execution failed")
                end

                -- ⏱️ THROTTLING: Force the connection to sleep if going too fast!
                if delay >= 0.001 then
                    ngx.sleep(delay)
                end

                -- 🔐 Inject context headers
                ngx.req.set_header("X-User-Id", payload.public_id)
                ngx.req.set_header("X-User-Name", payload.name)
                ngx.req.set_header("X-User-Email", payload.email)
                ngx.req.set_header("X-User-Role", payload.role)
                ngx.req.set_header("X-mobile_number", payload.mobile_number)
                ngx.req.set_header("X-Restaurant-Id", payload.restaurant_id)
                ngx.req.set_header("X-is_superadmin", payload.is_superadmin)
            }

            proxy_pass http://cart_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }


        # ====================================================
        # ================= ORDER ROUTES =====================
        # ====================================================

        location /api/order/ {
            
            # 1. 🛑 INSTANT KILL SWITCH
            if ($allowed_origin = "") {
                add_header Content-Type application/json always;
                return 403 '{"success": false, "error": {"code": "CORS_ERROR", "message": "Cross-Origin Request Blocked. Origin not allowed."}}'; 
            }

            set $cors_origin $allowed_origin;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Idempotency-Key" always;
                
                add_header Access-Control-Allow-Credentials "true" always;
                return 204;
            }

            add_header Access-Control-Allow-Origin $cors_origin always;
