                if role and role ~= payload.role then
                    return respond(403, "ROLE_MISMATCH", "You are not allowed to access this resource")
                end

                local limit_req = require "resty.limit.req"
                local lim, err = limit_req.new("rl_menu", 20, 30)
                
                if not lim then
