        # ====================================================
        # ================= NOTIFICATION ROUTES ==============
        # ====================================================


        location /ws/ {

            access_by_lua_block {
                local jwt = require "resty.jwt"
                local cjson = require "cjson"

                local function respond(status, code, message)
                    ngx.status = status
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say(cjson.encode({
                        success = false,
                        error = { code = code, message = message }
                    }))
                    return ngx.exit(status)
                end

                -- 1️⃣ Authorization header or query token
                local auth = ngx.var.http_authorization
                local token = nil

                if auth then
                    token = auth:match("Bearer%s+(.+)")
                end

                if not token then
                    token = ngx.var.arg_token
                end

                if not token then
                    return respond(401, "AUTH_MISSING", "Token required")
                end

                -- 2️⃣ Load public key
                local pubkey = ngx.shared.jwt_cache:get("pubkey")
                if not pubkey then
                    local f = io.open("/etc/nginx/jwt/public.pem", "r")
                    if not f then
                        return respond(500, "GATEWAY_ERROR", "Public key not found")
                    end
                    pubkey = f:read("*a")
                    f:close()
                    ngx.shared.jwt_cache:set("pubkey", pubkey)
                end

                -- 3️⃣ Verify JWT
                local jwt_obj = jwt:verify(pubkey, token)
                if not jwt_obj.verified then
                    return respond(401, "TOKEN_INVALID", "Invalid or expired token")
                end

                local payload = jwt_obj.payload

                if payload.is_active ~= true then
                    return respond(403, "ACCOUNT_BLOCKED", "User account is inactive")
                end

                if not payload.restaurant_id then
                    return respond(403, "TENANT_MISSING", "Restaurant context missing")
                end

                -- 4️⃣ Forward user info to Django
                ngx.req.set_header("X-User-Id", payload.public_id)
                ngx.req.set_header("X-User-Name", payload.name)
                ngx.req.set_header("X-User-Email", payload.email)
                ngx.req.set_header("X-User-Role", payload.role)
                ngx.req.set_header("X-Restaurant-Id", payload.restaurant_id)
                ngx.req.set_header("X-Is-Superadmin", payload.is_superadmin)
            }

            proxy_pass http://notification_upstream;

            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_read_timeout 3600;
            proxy_send_timeout 3600;

            proxy_buffering off;
        }
        

    
        location /api/notification/ {

            set $cors_origin $http_origin;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
                add_header Access-Control-Allow-Credentials "true" always;
                return 204;
            }

            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials "true" always;

            access_by_lua_block {
                local jwt = require "resty.jwt"
                local cjson = require "cjson"

                local function respond(status, code, message)
                    ngx.status = status
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say(cjson.encode({
                        success = false,
                        error = { code = code, message = message }
                    }))
                    return ngx.exit(status)
                end

                local auth = ngx.var.http_authorization
                if not auth then
                    return respond(401, "AUTH_HEADER_MISSING", "Authorization header is required")
                end

                local token = auth:match("Bearer%s+(.+)")
                if not token then
                    return respond(401, "TOKEN_FORMAT_INVALID", "Invalid token format")
                end

                local pubkey = ngx.shared.jwt_cache:get("pubkey")
                if not pubkey then
                    local f = io.open("/etc/nginx/jwt/public.pem", "r")
                    if not f then
                        return respond(500, "GATEWAY_ERROR", "Public key not found")
                    end
                    pubkey = f:read("*a")
                    f:close()
                    ngx.shared.jwt_cache:set("pubkey", pubkey)
                end

                local jwt_obj = jwt:verify(pubkey, token)
                if not jwt_obj.verified then
                    return respond(401, "TOKEN_INVALID", "Invalid or expired token")
                end

                local payload = jwt_obj.payload

                if payload.is_active ~= true then
                    return respond(403, "ACCOUNT_BLOCKED", "User account is inactive")
                end

                local role = ngx.var.uri:match("^/api/notification/([^/]+)/")
                if role and role ~= payload.role then
                    return respond(
                        403,
                        "ROLE_MISMATCH",
                        "You are not allowed to access this resource"
                    )
                end

                ngx.req.set_header("X-User-Id", payload.public_id)
                ngx.req.set_header("X-User-Name", payload.name)
                ngx.req.set_header("X-User-Email", payload.email)
                ngx.req.set_header("X-User-Role", payload.role)
                ngx.req.set_header("X-Mobile-Number", payload.mobile_number)
                ngx.req.set_header("X-Restaurant-Id", payload.restaurant_id)
                ngx.req.set_header("X-Is-Superadmin", payload.is_superadmin)

                if not payload.restaurant_id then
                    return respond(403, "TENANT_MISSING", "Restaurant context missing")
                end
            }

            proxy_pass http://notification_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ====================================================
        # ================= AI ROUTES ========================
        # ====================================================


        location /api/ai/ {
            
            set $cors_origin $http_origin;

            # CORS
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Table-Id" always;
                add_header Access-Control-Allow-Credentials "true" always;
                return 204;
            }

            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Table-Id" always;

            access_by_lua_block {
                local jwt = require "resty.jwt"
                local cjson = require "cjson"

                local function respond(status, code, message)
                    ngx.status = status
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say(cjson.encode({
                        success = false,
                        error = { code = code, message = message }
                    }))
                    return ngx.exit(status)
                end

                -- 🔐 NO PUBLIC ROUTES (fully protected)

                -- 1️⃣ Authorization header
                local auth = ngx.var.http_authorization
                if not auth then
                    return respond(401, "AUTH_HEADER_MISSING", "Authorization header is required")
                end

                -- 2️⃣ Extract token
                local token = auth:match("Bearer%s+(.+)")
                if not token then
                    return respond(401, "TOKEN_FORMAT_INVALID", "Invalid token format")
                end

                -- 3️⃣ Load public key (cached)
                local pubkey = ngx.shared.jwt_cache:get("pubkey")
                if not pubkey then
                    local f = io.open("/etc/nginx/jwt/public.pem", "r")
                    if not f then
                        return respond(500, "GATEWAY_ERROR", "Public key not found")
                    end
                    pubkey = f:read("*a")
                    f:close()
                    ngx.shared.jwt_cache:set("pubkey", pubkey)
                end

                -- 4️⃣ Verify JWT
                local jwt_obj = jwt:verify(pubkey, token)
                if not jwt_obj.verified then
                    return respond(401, "TOKEN_INVALID", "Invalid or expired token")
                end

                local payload = jwt_obj.payload

                -- 5️⃣ Account check
                if payload.is_active ~= true then
                    return respond(403, "ACCOUNT_BLOCKED", "User account is inactive")
                end

                -- 6️⃣ Inject headers to AI service
                ngx.req.set_header("X-User-Id", payload.public_id)
                ngx.req.set_header("X-User-Role", payload.role)
                ngx.req.set_header("X-Restaurant-Id", payload.restaurant_id)
            }

            proxy_pass http://ai_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

    }
