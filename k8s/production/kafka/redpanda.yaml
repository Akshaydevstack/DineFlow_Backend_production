apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda
  namespace: dineflow-production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      containers:
      - name: redpanda
        image: redpandadata/redpanda:latest
        # 🚀 Forces Kubernetes to run this exactly like a bash terminal using the rpk wrapper
        command:
          - /bin/sh
          - -c
          - "rpk redpanda start --smp 1 --memory 512M --reserve-memory 0 --overprovisioned --kafka-addr PLAINTEXT://0.0.0.0:9092 --advertise-kafka-addr PLAINTEXT://redpanda.dineflow-production.svc.cluster.local:9092"
        ports:
        - containerPort: 9092
          name: kafka
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: dineflow-production
spec:
  selector:
    app: redpanda
  ports:
    - protocol: TCP
      port: 9092
      targetPort: 9092