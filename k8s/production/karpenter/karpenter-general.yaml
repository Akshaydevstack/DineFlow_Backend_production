# ==========================================
# 1. EC2NodeClass for General Workloads
# ==========================================
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: general-nodeclass
spec:
  amiSelectorTerms:
    - alias: al2023@latest
  role: "KarpenterNodeRole-dineflow-production" 
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "dineflow-production-cluster"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "dineflow-production-cluster"

---
# ==========================================
# 2. NodePool for General Workloads
# ==========================================
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: general-pool
spec:
  template:
    metadata:
      labels:
        workload-type: "general" 
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: general-nodeclass
      
      # NO TAINT: Keeps this pool open for all standard microservices

      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        # 🚀 ALIGNED WITH AI POOL: category and generation constraints
        - key: "karpenter.k8s.aws/instance-category"
          operator: In
          values: ["t", "m", "c"] 
        - key: "karpenter.k8s.aws/instance-generation"
          operator: Gt
          values: ["3"]
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: ["on-demand"]
        - key: "karpenter.k8s.aws/instance-hypervisor"
          operator: In
          values: ["nitro"]

  limits:
    cpu: "100"
    memory: "1000Gi"

  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 30s