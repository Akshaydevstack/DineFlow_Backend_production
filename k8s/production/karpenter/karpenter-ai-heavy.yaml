# ==========================================
# 1. EC2NodeClass: HOW to build the AWS server
# ==========================================
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: ai-heavy-nodeclass
spec:
  # 🚀 FIX: Required in v1. Karpenter needs to know which AMI to pick.
  # This selector tells Karpenter to pick the latest Amazon Linux 2023 EKS-optimized AMI
  amiSelectorTerms:
    - alias: al2023@latest
  
  role: "KarpenterNodeRole-dineflow-production" 
  
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "dineflow-production-cluster"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "dineflow-production-cluster"

---
# ==========================================
# 2. NodePool: WHEN and WHAT to build
# ==========================================
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: ai-heavy-pool
spec:
  template:
    metadata:
      labels:
        workload-type: "ai-heavy" 
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: ai-heavy-nodeclass
      
      taints:
        - key: workload-type
          value: ai-heavy
          effect: NoSchedule

      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["m", "r", "c", "t"] # Added 't' for cheaper testing capacity
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["3"] # Lowered to 3 to get more hits
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"] 
        - key: "karpenter.k8s.aws/instance-hypervisor"
          operator: In
          values: ["nitro"]

  limits:
    cpu: "100"
    memory: "1000Gi"

  # 🚀 FIX: v1 uses "WhenEmptyOrUnderutilized" instead of "WhenUnderutilized"
  # and requires "consolidateAfter" to be explicitly set.
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 30s