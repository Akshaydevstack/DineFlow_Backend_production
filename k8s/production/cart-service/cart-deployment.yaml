apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: dineflow-production
spec:
  replicas: 1 
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0 
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      initContainers:
        - name: init-cart-db
          image: postgres:15
          imagePullPolicy: IfNotPresent
          env:
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_HOST
            - name: PGUSER
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PASSWORD
          command:
            - sh
            - -c
            - |
              echo "Waiting for AWS RDS Database..."
              until pg_isready -h $PGHOST -U $PGUSER; do
                sleep 2
              done
      containers:
        - name: cart-service
          image: 831411500771.dkr.ecr.ap-south-1.amazonaws.com/dineflow-cart:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          env:
            - name: K8S_ENV
              value: "true"
            - name: SERVICE_NAME
              value: "cart"
            - name: DJANGO_SETTINGS_MODULE
              value: cart_service.settings
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_PORT
            - name: DB_NAME
              value: "postgres" 
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: POSTGRES_PORT
            - name: MENU_SERVICE_URL
              value: http://menu-service.dineflow-production.svc.cluster.local:8000
          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: cart-service
  namespace: dineflow-production 
spec:
  selector:
    app: cart-service
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP

---
# 🚀 Production-Ready Cart Menu Kafka Consumer
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-menu-consumer
  namespace: dineflow-production
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: cart-menu-consumer
  template:
    metadata:
      labels:
        app: cart-menu-consumer
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: consumer
          image: 831411500771.dkr.ecr.ap-south-1.amazonaws.com/dineflow-cart:latest
          imagePullPolicy: Always
          command:
            - python
            - manage.py
            - consume_menu_events
          env:
            - name: K8S_ENV
              value: "true"
            - name: SERVICE_NAME
              value: "cart"
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: DB_NAME
              value: "postgres" 
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: POSTGRES_PORT
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_PORT
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"