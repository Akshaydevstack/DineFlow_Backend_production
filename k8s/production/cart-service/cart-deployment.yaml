apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: dineflow-production
spec:
  replicas: 1 # 🚀 Upgraded: High Availability (Runs 2 pods instead of 1)

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0 # 🚀 Upgraded: Ensures zero downtime during GitHub Action deployments

  selector:
    matchLabels:
      app: cart-service

  template:
    metadata:
      labels:
        app: cart-service

    spec:
      initContainers:
        - name: init-cart-db
          image: postgres:15
          imagePullPolicy: IfNotPresent
          # 🚀 Upgraded: Securely fetches RDS credentials instead of hardcoding 'postgres'
          env:
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_HOST
            - name: PGUSER
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PASSWORD
          command:
            - sh
            - -c
            - |
              echo "Waiting for AWS RDS Database..."
              until pg_isready -h $PGHOST -U $PGUSER; do
                sleep 2
              done

      containers:
        - name: cart-service
          # 🚀 Upgraded: Points to your secure AWS ECR repository
          image: 332704998262.dkr.ecr.ap-south-1.amazonaws.com/dineflow-cart:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000

          # 🚀 Upgraded: Resource limits prevent this pod from starving other microservices
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

          env:
            - name: K8S_ENV
              value: "true"

            - name: DJANGO_SETTINGS_MODULE
              value: cart_service.settings

            # 🚀 Upgraded: Dynamically pulls Redis config
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_HOST

            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_PORT

            # 🚀 Upgraded: Database configured for the isolated 'cart_db' on RDS
            - name: DB_NAME
              value: cart_db 
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: POSTGRES_PORT

            # 🚀 Upgraded: Internal DNS points to the production namespace
            - name: MENU_SERVICE_URL
              value: http://menu-service.dineflow-production.svc.cluster.local:8000

          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: cart-service
  namespace: dineflow-production # 🚀 Upgraded namespace
spec:
  selector:
    app: cart-service
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
---
# 🚀 ADDED: Production-Ready Cart Menu Kafka Consumer




apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-menu-consumer
  namespace: dineflow-production
spec:
  replicas: 1 # Consumers usually scale based on lag, 1 is perfect to start
  selector:
    matchLabels:
      app: cart-menu-consumer
  template:
    metadata:
      labels:
        app: cart-menu-consumer
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: consumer
          # 🚀 Upgraded: Points to the ECR Image
          image: 332704998262.dkr.ecr.ap-south-1.amazonaws.com/dineflow-cart:latest
          imagePullPolicy: Always
          command:
            - python
            - manage.py
            - consume_menu_events

          env:
            - name: K8S_ENV
              value: "true"

            # 🚀 Upgraded: Dynamically pulls the Redpanda broker URL
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: KAFKA_BOOTSTRAP_SERVERS

            # 🚀 Upgraded: Database configured securely for 'cart_db' on RDS
            - name: DB_NAME
              value: cart_db 
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: POSTGRES_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: POSTGRES_PORT

            # 🚀 Upgraded: Dynamically pulls Redis config
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_PORT

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"