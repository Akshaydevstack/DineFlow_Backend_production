                  name: dineflow-config
                  key: AWS_DEFAULT_REGION
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY
            
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_PORT

            - name: CELERY_BROKER_URL
              value: "redis://$(REDIS_HOST):$(REDIS_PORT)/0"
            - name: DJANGO_SETTINGS_MODULE
              value: "notification_service.settings"
            - name: DB_NAME
              value: "notification_db"
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: POSTGRES_PORT
                  
            # 🚀 Firebase Credentials
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/etc/secrets/firebase/firebase-credentials.json"
              
          volumeMounts:
            - name: firebase-secret-volume
              mountPath: /etc/secrets/firebase
              readOnly: true
              
      volumes:
        - name: firebase-secret-volume
          secret:
            secretName: firebase-auth-secret

---
# ==========================================
# 4. FIREBASE NOTIFICATION CONSUMER
# ==========================================
apiVersion: apps/v1
