# ==========================================
# 1. MAIN NOTIFICATION API SERVICE
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: dineflow-production
spec:
  replicas: 1 # 🚀 Lowered to 1 to save AWS server space
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      initContainers:
        - name: init-notification-db
          image: postgres:15
          imagePullPolicy: IfNotPresent
          env:
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_HOST
            - name: PGUSER
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PASSWORD
          command:
            - sh
            - -c
            - |
              echo "Waiting for AWS RDS Database..."
              until pg_isready -h $PGHOST -U $PGUSER; do
                sleep 2
              done
      containers:
        - name: notification-service
          image: 332704998262.dkr.ecr.ap-south-1.amazonaws.com/dineflow-notification:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          
          # 🚀 LOWERED RESOURCE REQUESTS HERE
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
              
          env:
            - name: K8S_ENV
              value: "true"
            - name: DJANGO_SETTINGS_MODULE
              value: notification_service.settings

            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_PORT

            - name: DB_NAME
              value: notification_db
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: POSTGRES_PORT
                  
            # 🚀 Firebase Credentials
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/etc/secrets/firebase/firebase-credentials.json"
              
          volumeMounts:
            - name: firebase-secret-volume
              mountPath: /etc/secrets/firebase
              readOnly: true
              
          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3
            
      volumes:
        - name: firebase-secret-volume
          secret:
            secretName: firebase-auth-secret

---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: dineflow-production
spec:
  selector:
    app: notification-service
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP

---
# ==========================================
# 2. CELERY BEAT (CRITICAL: MUST BE REPLICA 1)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-celery-beat
  namespace: dineflow-production
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: notification-celery-beat
  template:
    metadata:
      labels:
        app: notification-celery-beat
    spec:
      containers:
        - name: celery-beat
          image: 332704998262.dkr.ecr.ap-south-1.amazonaws.com/dineflow-notification:latest
          imagePullPolicy: Always  
          command:
            - celery
            - -A
            - notification_service
            - beat
            - -l
            - info
          
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: AWS_DEFAULT_REGION
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: AWS_DEFAULT_REGION
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_PORT
            # 🚀 Dynamically constructs the URL using Kubernetes interpolation
            - name: CELERY_BROKER_URL
              value: "redis://$(REDIS_HOST):$(REDIS_PORT)/0"
            - name: DJANGO_SETTINGS_MODULE
              value: "notification_service.settings"
            - name: DB_NAME
              value: "notification_db"
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: POSTGRES_PORT
                  
            # 🚀 Firebase Credentials
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/etc/secrets/firebase/firebase-credentials.json"
              
          volumeMounts:
            - name: firebase-secret-volume
              mountPath: /etc/secrets/firebase
              readOnly: true
              
      volumes:
        - name: firebase-secret-volume
          secret:
            secretName: firebase-auth-secret

---
# ==========================================
# 3. CELERY WORKER
# ==========================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-celery-worker
  namespace: dineflow-production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-celery-worker
  template:
    metadata:
      labels:
        app: notification-celery-worker
    spec:
      containers:
        - name: celery-worker
          image: 332704998262.dkr.ecr.ap-south-1.amazonaws.com/dineflow-notification:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - notification_service
            - worker
            - --loglevel=info
            - -Q
            - notification_queue
            
          # 🚀 LOWERED RESOURCE REQUESTS HERE
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
