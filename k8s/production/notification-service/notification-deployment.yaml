  name: notification-consumer
  namespace: dineflow-production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-consumer
  template:
    metadata:
      labels:
        app: notification-consumer
    spec:
      containers:
        - name: consumer
          image: 332704998262.dkr.ecr.ap-south-1.amazonaws.com/dineflow-notification:latest
          imagePullPolicy: Always
          command:
            - python
            - manage.py
            - consume_notifications
          
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"

          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_PORT
            - name: CELERY_BROKER_URL
              value: "redis://$(REDIS_HOST):$(REDIS_PORT)/0"
            - name: DB_NAME
              value: "notification_db"
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: POSTGRES_PORT
                  
            # 🚀 MATCHING AUTH SERVICE SETUP
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/etc/secrets/firebase/firebase-credentials.json"
              
          volumeMounts:
            # 🚀 MATCHING AUTH SERVICE SETUP
            - name: firebase-secret-volume
              mountPath: /etc/secrets/firebase
              readOnly: true
              
      volumes:
        # 🚀 MATCHING AUTH SERVICE SETUP
        - name: firebase-secret-volume
