# ==========================================
# 1. Auth Service API Deployment (Dev)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: dineflow-dev
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      # Note: initContainers for pg_isready removed. 
      # We are using Supabase now, so the DB is always available externally.
      
      containers:
        - name: auth-service
          image: dineflow_backend-auth_service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: K8S_ENV
              value: "true"

            # ✉️ --- SMTP Credentials from Secret ---
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: smtp-credentials
                  key: SMTP_USER

            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smtp-credentials
                  key: SMTP_PASSWORD

            # 🔴 --- Redis Configuration ---
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_PORT

            # 🛠️ --- Kafka Configuration ---
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: KAFKA_BOOTSTRAP_SERVERS

            # 🗄️ --- Database Configuration (Supabase) ---
            - name: DB_NAME
              value: "auth_db"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PORT

            # 🌐 --- Internal Service Discovery ---
            - name: ORDER_SERVICE_TENANT_PROVISION_URL
              value: "http://order-service.dineflow-dev.svc.cluster.local:8000/internal/tenants/provision"
            - name: MENU_SERVICE_TENANT_PROVISION_URL
              value: "http://menu-service.dineflow-dev.svc.cluster.local:8000/internal/tenants/provision"
            - name: CART_SERVICE_TENANT_PROVISION_URL
              value: "http://cart-service.dineflow-dev.svc.cluster.local:8000/internal/tenants/provision"
            - name: KITCHEN_SERVICE_TENANT_PROVISION_URL
              value: "http://kitchen-service.dineflow-dev.svc.cluster.local:8000/internal/tenants/provision"
            - name: NOTIFICATION_SERVICE_TENANT_PROVISION_URL
              value: "http://notification-service.dineflow-dev.svc.cluster.local:8000/internal/tenants/provision"

            # 🔥 --- Firebase ---
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/etc/secrets/firebase/firebase-credentials.json"

          volumeMounts:
            # Fixed to use the single 'jwt-keys' secret created by our script
            - name: jwt-keys-volume
              mountPath: /app/jwt_keys/private.pem
              subPath: private.pem
              readOnly: true
            - name: jwt-keys-volume
              mountPath: /app/jwt_keys/public.pem
              subPath: public.pem
              readOnly: true
            - name: firebase-secret-volume
              mountPath: /etc/secrets/firebase
              readOnly: true

          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10

      volumes:
        # Changed from two separate secrets to the single combined secret
        - name: jwt-keys-volume
          secret:
            secretName: jwt-keys
        - name: firebase-secret-volume
          secret:
            secretName: firebase-auth-secret

---
# ==========================================
# 2. Auth Table Session Consumer (Dev)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-table-session-consumer
  namespace: dineflow-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-table-session-consumer
  template:
    metadata:
      labels:
        app: auth-table-session-consumer
    spec:
      containers:
        - name: consumer
          image: dineflow_backend-auth_service:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - manage.py
            - consume_table_session_events
          env:
            - name: K8S_ENV
              value: "true"
              
            # 🗄️ --- Database Configuration (Supabase) ---
            - name: DB_NAME
              value: "auth_db"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PORT

            # 🛠️ --- Kafka Configuration ---
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: KAFKA_BOOTSTRAP_SERVERS

            # 🔥 --- Firebase ---
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/etc/secrets/firebase/firebase-credentials.json"
          
          volumeMounts:
            - name: firebase-secret-volume
              mountPath: /etc/secrets/firebase
              readOnly: true
              
      volumes:
        - name: firebase-secret-volume
          secret:
            secretName: firebase-auth-secret


---
# ==========================================
# Auth Service Network ClusterIP (Dev)
# ==========================================
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: dineflow-dev
spec:
  selector:
    app: auth-service
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP