apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-db
  namespace: dineflow-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-db
  template:
    metadata:
      labels:
        app: notification-db
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: notification_db
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
          volumeMounts:
            - name: notification-db-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: notification-db-data
          emptyDir: {}   # ⚠️ Replace with PVC in production
---
apiVersion: v1
kind: Service
metadata:
  name: notification-db
  namespace: dineflow-dev
spec:
  selector:
    app: notification-db
  ports:
    - port: 5432
      targetPort: 5432