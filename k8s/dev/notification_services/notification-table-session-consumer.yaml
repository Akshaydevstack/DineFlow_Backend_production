apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-table-session-consumer
  namespace: dineflow-dev

spec:
  replicas: 1

  selector:
    matchLabels:
      app: notification-table-session-consumer

  template:
    metadata:
      labels:
        app: notification-table-session-consumer

    spec:
      containers:
        - name: consumer
          image: dineflow_backend-notification_service:latest
          imagePullPolicy: Never

          command:
            - python
            - manage.py
            - consume_table_sessions

          env:
            - name: KAFKA_BROKER
              value: "host.docker.internal:9092"

            - name: DJANGO_SETTINGS_MODULE
              value: "notification_service.settings"

            - name: DB_NAME
              value: "notification_db"

            - name: DB_USER
              value: "postgres"

            - name: DB_PASSWORD
              value: "postgres"

            - name: DB_HOST
              value: "notification-db"

            - name: DB_PORT
              value: "5432"

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"

            limits:
              memory: "256Mi"
              cpu: "300m"