---
# ==========================================
# 5. Notification Service API (Dev)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: dineflow-dev
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: dineflow_backend-notification_service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: K8S_ENV
              value: "true"
            - name: DJANGO_SETTINGS_MODULE
              value: notification_service.settings
              
            # 🔴 --- Redis Configuration ---
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_PORT
            
            - name: SERVICE_NAME
              value: "notification"

            # 🗄️ --- Database Configuration (Supabase) ---
            - name: DB_NAME
              value: "postgres"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PORT
                  
            # 🛠️ --- Kafka Configuration ---
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: KAFKA_BROKER
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: KAFKA_BOOTSTRAP_SERVERS

            # 🔥 --- Firebase Configuration ---
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/secrets/firebase-credentials.json"

          volumeMounts:
            - name: firebase-credentials
              mountPath: /secrets
              readOnly: true

          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10

      volumes:
        - name: firebase-credentials
          secret:
            secretName: firebase-auth-secret

---
# ==========================================
# 6. Notification Service Network ClusterIP
# ==========================================
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: dineflow-dev
spec:
  selector:
    app: notification-service
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP

---
# ==========================================
# 7. Notification Table Session Consumer
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-table-session-consumer
  namespace: dineflow-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-table-session-consumer
  template:
    metadata:
      labels:
        app: notification-table-session-consumer
    spec:
      containers:
        - name: consumer
          image: dineflow_backend-notification_service:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - manage.py
            - consume_table_sessions
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: "notification_service.settings"
            
            - name: SERVICE_NAME
              value: "notification"
              
            # 🔴 --- Redis Configuration ---
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_PORT

            # 🛠️ --- Kafka Configuration ---
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: KAFKA_BOOTSTRAP_SERVERS

            # 🗄️ --- Database Configuration (Supabase) ---
            - name: DB_NAME
              value: "postgres"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PORT

            # 🔥 --- Firebase Configuration ---
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/secrets/firebase-credentials.json"

          volumeMounts:
            - name: firebase-credentials
              mountPath: /secrets
              readOnly: true

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"

      volumes:
        - name: firebase-credentials
          secret:
            secretName: firebase-auth-secret