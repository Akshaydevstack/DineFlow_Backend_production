# ==========================================
# 1. Notification Celery Beat (Dev)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-celery-beat
  namespace: dineflow-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-celery-beat
  template:
    metadata:
      labels:
        app: notification-celery-beat
    spec:
      containers:
        - name: celery-beat
          image: dineflow_backend-notification_service:latest
          imagePullPolicy: IfNotPresent  
          command:
            - celery
            - -A
            - notification_service
            - beat
            - -l
            - info
          env:
            - name: CELERY_BROKER_URL
              value: "redis://redis:6379/0"
            - name: DJANGO_SETTINGS_MODULE
              value: "notification_service.settings"

            - name: SERVICE_NAME
              value: "notification"
            
            # 🔴 --- Redis Configuration ---
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_PORT

            # 🗄️ --- Database Configuration (Supabase) ---
            - name: DB_NAME
              value: "postgres"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PORT

            # 🔥 --- Firebase Configuration ---
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/secrets/firebase-credentials.json"

          volumeMounts:
            - name: firebase-credentials
              mountPath: /secrets
              readOnly: true

      volumes:
        - name: firebase-credentials
          secret:
            secretName: firebase-auth-secret

---
# ==========================================
# 2. Notification Celery Worker (Dev)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-celery-worker
  namespace: dineflow-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-celery-worker
  template:
    metadata:
      labels:
        app: notification-celery-worker
    spec:
      containers:
        - name: celery-worker
          image: dineflow_backend-notification_service:latest
          imagePullPolicy: IfNotPresent
          command:
            - celery
            - -A
            - notification_service
            - worker
            - --loglevel=info
            - -Q
            - notification_queue
          env:
            - name: CELERY_BROKER_URL
              value: "redis://redis:6379/0"
            - name: DJANGO_SETTINGS_MODULE
              value: "notification_service.settings"
              
            - name: SERVICE_NAME
              value: "notification"

            # 🔴 --- Redis Configuration ---
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_PORT

            # 🗄️ --- Database Configuration (Supabase) ---
            - name: DB_NAME
              value: "postgres"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PORT

            # 🔥 --- Firebase Configuration ---
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/secrets/firebase-credentials.json"

          volumeMounts:
            - name: firebase-credentials
              mountPath: /secrets
              readOnly: true

      volumes:
        - name: firebase-credentials
          secret:
            secretName: firebase-auth-secret

