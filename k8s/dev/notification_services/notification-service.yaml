apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: dineflow-dev
spec:
  replicas: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

  selector:
    matchLabels:
      app: notification-service

  template:
    metadata:
      labels:
        app: notification-service

    spec:
      initContainers:
        - name: init-notification-db
          image: postgres:15
          imagePullPolicy: IfNotPresent
          env:
            - name: PGPASSWORD
              value: postgres
          command:
            - sh
            - -c
            - |
              echo "Waiting for Notification DB..."
              until pg_isready -h notification-db -U postgres; do
                sleep 2
              done

      containers:
        - name: notification-service
          image: dineflow_backend-notification_service:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 8000

          env:
            - name: K8S_ENV
              value: "true"

            - name: DJANGO_SETTINGS_MODULE
              value: notification_service.settings

            - name: DB_NAME
              value: notification_db
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: DB_HOST
              value: notification-db
            - name: DB_PORT
              value: "5432"
            - name: KAFKA_BROKER
              value: host.docker.internal:9092

          # -------------------------------
          # Health Checks
          # -------------------------------
          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: dineflow-dev
spec:
  selector:
    app: notification-service
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP