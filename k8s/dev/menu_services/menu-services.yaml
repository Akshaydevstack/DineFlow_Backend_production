# ==========================================
# 1. Menu Service API Deployment (Dev)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: menu-service
  namespace: dineflow-dev
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: menu-service
  template:
    metadata:
      labels:
        app: menu-service
    spec:
      # Note: initContainers for pg_isready removed. 
      # Supabase DB is externally managed.
      containers:
        - name: menu-service
          image: dineflow_backend-menu_service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: K8S_ENV
              value: "true"
        
            - name: SERVICE_NAME
              value: "menu"

            # 🗄️ --- Database Configuration (Supabase) ---
            - name: DB_NAME
              value: "postgres"   # <--- Hardcoded strictly to menu_db
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PORT

            # 🔴 --- Redis Configuration ---
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_PORT

          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10

---
# ==========================================
# 2. Menu Service Network ClusterIP (Dev)
# ==========================================
apiVersion: v1
kind: Service
metadata:
  name: menu-service
  namespace: dineflow-dev
spec:
  selector:
    app: menu-service
  ports:
    - port: 8000
      targetPort: 8000