# ==========================================
# 1. Cart Menu Consumer Deployment (Dev)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-menu-consumer
  namespace: dineflow-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart-menu-consumer
  template:
    metadata:
      labels:
        app: cart-menu-consumer
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: consumer
          image: dineflow/cart-service:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - manage.py
            - consume_menu_events
          env:
            - name: K8S_ENV
              value: "true"
              
            # 🟢 FIX 1: Service Name for Schema Isolation
            - name: SERVICE_NAME
              value: "cart"

            # 🛠️ --- Kafka Configuration ---
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: KAFKA_BOOTSTRAP_SERVERS

            # 🗄️ --- Database Configuration (Supabase) ---
            - name: DB_NAME
              value: "postgres"   # 🟢 FIX 2: Must be postgres for Supabase
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PORT

            # 🔴 --- Redis Configuration ---
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_PORT

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

---
# ==========================================
# 2. Cart Service API Deployment (Dev)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: dineflow-dev
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      containers:
        - name: cart-service
          image: dineflow/cart-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000

          env:
            - name: K8S_ENV
              value: "true"
            - name: DJANGO_SETTINGS_MODULE
              value: "cart_service.settings"
              
            # 🟢 FIX 1: Service Name for Schema Isolation
            - name: SERVICE_NAME
              value: "cart"
              
            # 🛠️ --- Kafka Configuration ---
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: KAFKA_BOOTSTRAP_SERVERS

            # 🔴 --- Redis Configuration ---
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_PORT

            # 🗄️ --- Database Configuration (Supabase) ---
            - name: DB_NAME
              value: "postgres"   # 🟢 FIX 2: Must be postgres for Supabase
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PORT

            # 🌐 --- Internal Service Discovery ---
            - name: MENU_SERVICE_URL
              value: "http://menu-service.dineflow-dev.svc.cluster.local:8000"

          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10

---
# ==========================================
# 3. Cart Service Network ClusterIP (Dev)
# ==========================================
apiVersion: v1
kind: Service
metadata:
  name: cart-service
  namespace: dineflow-dev
spec:
  selector:
    app: cart-service
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP