# ==========================================
# 7. Order Service API (Dev)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: dineflow-dev
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      # Note: initContainers removed because Supabase DB is externally managed.
      containers:
        - name: order-service
          image: dineflow_backend-order_service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: K8S_ENV
              value: "true"
              
            # 🔴 --- Redis Configuration ---
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_PORT
            
            - name: SERVICE_NAME
              value: "order"

            # 🛠️ --- Kafka Configuration ---
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: KAFKA_BOOTSTRAP_SERVERS
                  
            # 🗄️ --- Database Configuration (Supabase) ---
            - name: DB_NAME
              value: "postgres"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PORT
              
          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10

---
# ==========================================
# 8. Order Service Network ClusterIP
# ==========================================
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: dineflow-dev
spec:
  selector:
    app: order-service
  ports:
    - port: 8000
      targetPort: 8000