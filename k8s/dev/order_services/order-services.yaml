# ==========================================
# 1. Order Celery Beat (Dev)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-celery-beat
  namespace: dineflow-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-celery-beat
  template:
    metadata:
      labels:
        app: order-celery-beat
    spec:
      containers:
        - name: celery-beat
          image: dineflow_backend-order_service:latest
          imagePullPolicy: IfNotPresent
          command:
            - celery
            - -A
            - order_service
            - beat
            - -l
            - info
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: "order_service.settings"

            - name: SERVICE_NAME
              value: "order"
            
            # 🔴 --- Redis Configuration ---
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_PORT

            # 🗄️ --- Database Configuration (Supabase) ---
            - name: DB_NAME
              value: "postgres"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PORT

---
# ==========================================
# 2. Order Celery Worker (Dev)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-celery-worker
  namespace: dineflow-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-celery-worker
  template:
    metadata:
      labels:
        app: order-celery-worker
    spec:
      containers:
        - name: celery-worker
          image: dineflow_backend-order_service:latest
          imagePullPolicy: IfNotPresent
          command:
            - celery
            - -A
            - order_service
            - worker
            - --loglevel=info
            - -Q
            - order_queue
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: "order_service.settings"
              
            - name: SERVICE_NAME
              value: "order"

            # 🔴 --- Redis Configuration ---
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_PORT

            # 🗄️ --- Database Configuration (Supabase) ---
            - name: DB_NAME
              value: "postgres"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PORT

