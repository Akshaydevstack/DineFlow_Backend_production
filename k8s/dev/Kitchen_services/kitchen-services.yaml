# ==========================================
# 1. Kitchen Service API Deployment (Dev)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kitchen-service
  namespace: dineflow-dev
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: kitchen-service
  template:
    metadata:
      labels:
        app: kitchen-service
    spec:
      # Note: initContainers removed because Supabase DB is externally managed.
      containers:
        - name: kitchen-service
          image: dineflow_backend-kitchen_service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000

          env:
            - name: K8S_ENV
              value: "true"

            - name: SERVICE_NAME
              value: "kitchen"
              
            # 🗄️ --- Database Configuration (Supabase) ---
            - name: DB_NAME
              value: "postgres"   
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PORT
                  
            # 🛠️ --- Kafka Configuration ---
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: KAFKA_BOOTSTRAP_SERVERS

          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10

---
# ==========================================
# 2. Kitchen Service Network ClusterIP (Dev)
# ==========================================
apiVersion: v1
kind: Service
metadata:
  name: kitchen-service
  namespace: dineflow-dev
spec:
  selector:
    app: kitchen-service
  ports:
    - port: 8000
      targetPort: 8000

---
# ==========================================
# 3. Kitchen Order Consumer Deployment (Dev)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kitchen-order-consumer
  namespace: dineflow-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kitchen-order-consumer
  template:
    metadata:
      labels:
        app: kitchen-order-consumer
    spec:
      containers:
        - name: consumer
          image: dineflow_backend-kitchen_service:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - manage.py
            - consume_order_events
          env:
            - name: K8S_ENV
              value: "true"

            - name: SERVICE_NAME
              value: "kitchen"
              
            # 🛠️ --- Kafka Configuration ---
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: KAFKA_BOOTSTRAP_SERVERS

            # 🗄️ --- Database Configuration (Supabase) ---
            - name: DB_NAME
              value: "postgres"   # <--- Hardcoded strictly to kitchen_db
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PORT

            # Optional but recommended
            - name: KAFKA_CONSUMER_NAME
              value: "kitchen-order-consumer"
            - name: KITCHEN_DLQ_TOPIC
              value: "kitchen.order.dlq"