# ==========================================
# 1. API Gateway (NGINX) Deployment (Dev)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: dineflow-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: nginx
          image: dineflow-nginx:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80

          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/custom_nginx.conf
              subPath: custom_nginx.conf

            # 🔑 Updated to use the unified jwt-keys volume
            - name: jwt-keys-volume
              mountPath: /etc/nginx/jwt/public.pem
              subPath: public.pem
              readOnly: true

      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config

        # 🔑 Updated to pull from the single secret created by your setup script
        - name: jwt-keys-volume
          secret:
            secretName: jwt-keys

---
# ==========================================
# 2. API Gateway Network NodePort (Dev)
# ==========================================
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: dineflow-dev
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - port: 80
      targetPort: 80
      # Maps localhost:30080 directly to this gateway on Docker Desktop
      nodePort: 30080