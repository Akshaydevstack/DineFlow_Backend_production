apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: dineflow-dev
spec:
  replicas: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

  selector:
    matchLabels:
      app: ai-service

  template:
    metadata:
      labels:
        app: ai-service

    spec:
      containers:
        - name: ai-service
          image: dineflow-ai-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8001

          # ✅ CRITICAL FIX: Ensure the ML models have enough RAM so Linux doesn't OOM kill it
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2.5Gi"
              cpu: "2000m"

          env:
            - name: K8S_ENV
              value: "true"

            # --- Internal Microservice URLs (Dev Namespace) ---
            - name: CART_SERVICE_URL
              value: "http://cart-service.dineflow-dev.svc.cluster.local:8000"

            - name: ORDERS_SERVICE_URL
              value: "http://order-service.dineflow-dev.svc.cluster.local:8000"
              
            - name: MENU_SERVICE_URL
              value: "http://menu-service.dineflow-dev.svc.cluster.local:8000"

            # --- Redis ---
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"

            # --- Postgres (pgvector) ---
            - name: POSTGRES_HOST
              value: "ai-db"                  
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "ai_db"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "postgres"

            # --- Kafka ---
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "host.docker.internal:9092"

            # --- Email / SMTP ---
            - name: SMTP_SERVER
              value: "smtp.gmail.com"
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: smtp-credentials
                  key: SMTP_USERNAME
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smtp-credentials
                  key: SMTP_PASSWORD

            # --- API Keys ---
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-credentials
                  key: GEMINI_API_KEY

            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: groq-credentials
                  key: GROQ_API_KEY

            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-credentials
                  key: HF_TOKEN

            # --- AWS ---
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID

            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY

            - name: AWS_DEFAULT_REGION
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_DEFAULT_REGION

          # ✅ CRITICAL FIX: Make Kubernetes more patient during heavy AI workloads
          readinessProbe:
            httpGet:
              path: /health/
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health/
              port: 8001
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: dineflow-dev
spec:
  selector:
    app: ai-service
  ports:
    - port: 8001
      targetPort: 8001