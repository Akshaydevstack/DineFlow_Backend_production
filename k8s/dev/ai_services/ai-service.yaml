# ==========================================
# 1. AI Kafka Consumer Deployment (Dev)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-kafka-consumer
  namespace: dineflow-dev
spec:
  replicas: 1
  # 🚀 Matches Prod: Tell Kubernetes to kill the old pod BEFORE starting the new one.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ai-kafka-consumer
  template:
    metadata:
      labels:
        app: ai-kafka-consumer
    spec:
      terminationGracePeriodSeconds: 30
      
      # Note: nodeSelector and tolerations removed so it can run on local Docker Desktop

      containers:
        - name: consumer
          image: dineflow-ai-service:latest
          imagePullPolicy: IfNotPresent 
          command:
            - python
            - -c
            - "from app.kafka.menu_consumer import consume_events; consume_events()"

          env:
            # --- Kafka ---
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: KAFKA_BOOTSTRAP_SERVERS

            # --- Internal Microservice URLs (Dev Namespace) ---
            - name: CART_SERVICE_URL
              value: "http://cart-service.dineflow-dev.svc.cluster.local:8000"
            - name: ORDERS_SERVICE_URL
              value: "http://order-service.dineflow-dev.svc.cluster.local:8000"
            - name: MENU_SERVICE_URL
              value: "http://menu-service.dineflow-dev.svc.cluster.local:8000"

            # --- Postgres ---
            - name: POSTGRES_DB
              value: "ai_db" 
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PASSWORD
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: POSTGRES_PORT

            # --- Redis ---
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_PORT

            # --- API Keys ---
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: groq-credentials
                  key: GROQ_API_KEY

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

---
# ==========================================
# 2. AI Service API Deployment (Dev)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: dineflow-dev 
spec:
  replicas: 1
  # 🚀 Matches Prod: Changed to Recreate to prevent memory deadlock
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      
      # Note: nodeSelector and tolerations removed for local Docker Desktop

      containers:
        - name: ai-service
          image: dineflow-ai-service:latest
          imagePullPolicy: IfNotPresent 
          ports:
            - containerPort: 8001

          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "1.5Gi"
              cpu: "2000m"

          env:
            - name: K8S_ENV
              value: "true"

            # 🌐 --- Internal Microservice URLs (Dev Namespace) ---
            - name: CART_SERVICE_URL
              value: "http://cart-service.dineflow-dev.svc.cluster.local:8000"
            - name: ORDERS_SERVICE_URL
              value: "http://order-service.dineflow-dev.svc.cluster.local:8000"
            - name: MENU_SERVICE_URL
              value: "http://menu-service.dineflow-dev.svc.cluster.local:8000"

            # --- Redis ---
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: REDIS_PORT

            # --- Postgres ---
            - name: POSTGRES_DB
              value: "ai_db"
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_PASSWORD
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: DB_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: POSTGRES_PORT

            # --- Kafka ---
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: dineflow-config
                  key: KAFKA_BOOTSTRAP_SERVERS

            # --- Email / SMTP ---
            - name: SMTP_SERVER
              value: "smtp.gmail.com"
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: smtp-credentials
                  key: SMTP_USER
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smtp-credentials
                  key: SMTP_PASSWORD

            # --- API Keys ---
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-credentials
                  key: GEMINI_API_KEY
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: groq-credentials
                  key: GROQ_API_KEY
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-credentials
                  key: HF_TOKEN

            # --- AWS ---
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              valueFrom:
                secretKeyRef:         
                  name: aws-credentials
                  key: AWS_DEFAULT_REGION

          readinessProbe:
            httpGet:
              path: /health/
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health/
              port: 8001
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5

---
# ==========================================
# 3. AI Service Network ClusterIP (Dev)
# ==========================================
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: dineflow-dev
spec:
  selector:
    app: ai-service
  ports:
    - port: 8001
      targetPort: 8001