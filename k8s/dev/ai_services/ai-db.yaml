apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-db
  namespace: dineflow-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-db
  template:
    metadata:
      labels:
        app: ai-db
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg15
          resources:
            requests:
              memory: "512Mi"
            limits:
              memory: "1Gi"
          env:
            - name: POSTGRES_DB
              value: ai_db
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: ai-db-storage
              mountPath: /var/lib/postgresql/data

      volumes:
        - name: ai-db-storage
          persistentVolumeClaim:
            claimName: ai-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ai-db
  namespace: dineflow-dev
spec:
  selector:
    app: ai-db
  ports:
    - port: 5432
      targetPort: 5432