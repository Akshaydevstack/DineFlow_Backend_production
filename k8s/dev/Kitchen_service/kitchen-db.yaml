apiVersion: apps/v1
kind: Deployment
metadata:
  name: kitchen-db
  namespace: dineflow-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kitchen-db
  template:
    metadata:
      labels:
        app: kitchen-db
    spec:
      containers:
        - name: postgres
          image: postgres:15
          env:
            - name: POSTGRES_DB
              value: kitchen_db
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: kitchen-db-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: kitchen-db-storage
          persistentVolumeClaim:
            claimName: kitchen-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: kitchen-db
  namespace: dineflow-dev
spec:
  selector:
    app: kitchen-db
  ports:
    - port: 5432
      targetPort: 5432