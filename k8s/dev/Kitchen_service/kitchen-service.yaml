apiVersion: apps/v1
kind: Deployment
metadata:
  name: kitchen-service
  namespace: dineflow-dev
spec:
  replicas: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

  selector:
    matchLabels:
      app: kitchen-service

  template:
    metadata:
      labels:
        app: kitchen-service

    spec:
      initContainers:
        - name: init-kitchen-db
          image: postgres:15
          imagePullPolicy: IfNotPresent
          env:
            - name: PGPASSWORD
              value: postgres
          command:
            - sh
            - -c
            - |
              echo "Waiting for Kitchen Postgres..."
              until pg_isready -h kitchen-db -U postgres; do
                sleep 2
              done

      containers:
        - name: kitchen-service
          image: dineflow_backend-kitchen_service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000

          env:
            - name: K8S_ENV
              value: "true"
            - name: DB_NAME
              value: "kitchen_db"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              value: "postgres"
            - name: DB_HOST
              value: "kitchen-db"
            - name: DB_PORT
              value: "5432"
            - name: KAFKA_BROKER
              value: "host.docker.internal:9092"

          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kitchen-service
  namespace: dineflow-dev
spec:
  selector:
    app: kitchen-service
  ports:
    - port: 8000
      targetPort: 8000