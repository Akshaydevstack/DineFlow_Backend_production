apiVersion: batch/v1
kind: Job
metadata:
  name: order-migrate-job
  namespace: dineflow-dev
spec:
  template:
    spec:
      restartPolicy: OnFailure

      initContainers:
        - name: wait-for-db
          image: postgres:15
          env:
            - name: PGPASSWORD
              value: postgres
          command:
            - sh
            - -c
            - |
              echo "Waiting for Postgres..."
              until pg_isready -h order-db -U postgres; do
                sleep 2
              done

      containers:
        - name: migrate
          image: dineflow_backend-order_service:latest
          imagePullPolicy: Never
          command:
            - sh
            - -c
            - |
              echo "Running base migrations (public schema)..."
              python manage.py makemigrations &&
              python manage.py migrate
          env:
            - name: DB_NAME
              value: order_db
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: DB_HOST
              value: order-db
            - name: DB_PORT
              value: "5432"