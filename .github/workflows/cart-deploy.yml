name: Deploy Cart Service

on:
  push:
    branches: [ main ]
    paths: [ 'cartService/**' , 'k8s/production/cartService/**' ] # 🚀 Watches the cartService folder

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          # 🚀 Points to dineflow-cart repo and ./cartService folder
          docker build -t $ECR_REGISTRY/dineflow-cart:latest ./cartService
          docker push $ECR_REGISTRY/dineflow-cart:latest

      # 🚀 UPGRADED: Connects GitHub Actions to your AWS EKS Cluster
      - name: Update KubeConfig
        run: aws eks update-kubeconfig --name dineflow-production-cluster --region ap-south-1

      # 🚀 UPGRADED: Triggers the zero-downtime deployment in Kubernetes
      - name: Deploy to EKS
        run: |

          kubectl apply -f k8s/production/cart-service/cart-deployment.yaml -n dineflow-production
          
          # Tells Kubernetes to gracefully spin down old pods and spin up new ones
          kubectl rollout restart deployment cart-service -n dineflow-production
          
          # Pauses the pipeline until the new pods are 100% healthy and running
          kubectl rollout status deployment cart-service -n dineflow-production