name: Deploy AI Service

on:
  push:
    branches: [ main ]
    paths: [ 'ai-service/**', 'k8s/production/ai-service/**' ] # 🚀 Added k8s folder so it runs if you update yaml

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/dineflow-ai:latest ./ai-service
          docker push $ECR_REGISTRY/dineflow-ai:latest

      # --- NEW STEPS FOR EKS DEPLOYMENT ---
      - name: Update KubeConfig
        run: |
          # 🚀 Connects to your production EKS cluster
          aws eks update-kubeconfig --name dineflow-production-cluster --region ap-south-1

      - name: Deploy to EKS and Restart Pods
        run: |

          kubectl apply -f k8s/production/ai-service/ai-deployment.yaml -n dineflow-production
          
          # Force the pods to pull the new 'latest' image we just pushed
          kubectl rollout restart deployment ai-service -n dineflow-production
          kubectl rollout restart deployment ai-kafka-consumer -n dineflow-production